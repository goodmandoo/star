    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>오늘의 별자리 운세 ✨</title>

        /* [<style>] : [인테리어 설계도] - 뼈대에 색을 입히고 예쁘게 꾸미는 CSS 공간. */
        
        body {
            background-color: #0b0e14; /* 배경색: 밤하늘색 */
            color: white; /* 글자색: 흰색 */
            font-family: 'Arial', sans-serif;
            
            /* [중앙 정렬] 요소들을 화면 정가운데에 배치 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh; /* 화면 높이를 100% 다 사용 */
            margin: 0;
            padding: 20px;
            box-sizing: border-box; /* 패딩이 박스 크기를 키우지 않게 설정 */
        }

        .container {
            /* [<div>] : [투명 박스] - 내용물들을 하나로 묶어주는 상자 구역. */
            width: 100%;
            max-width: 400px; /* PC에서는 최대 400px까지만 커짐 */
            text-align: center;
            background: rgba(255, 255, 255, 0.05); /* 5% 투명한 흰색 배경 */
            padding: 30px;
            border-radius: 20px; /* 모서리 둥글게 */
            backdrop-filter: blur(10px); /* [유리 효과] 배경을 흐릿하게 처리 */
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); /* 입체감 있는 그림자 */
        }
