<!DOCTYPE html>

<html lang="ko">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>오늘의 별자리 운세 ✨</title>
    
    <link rel="icon" href="https://fav.farm/✨">

    <style>
        /* [<style>] : [인테리어 설계도] - 뼈대에 색을 입히고 예쁘게 꾸미는 CSS 공간. */
        
        body {
            background-color: #0b0e14; /* 배경색: 밤하늘색 */
            color: white; /* 글자색: 흰색 */
            font-family: 'Arial', sans-serif;
            
            /* [중앙 정렬] 요소들을 화면 정가운데에 배치 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh; /* 화면 높이를 100% 다 사용 */
            margin: 0;
            padding: 20px;
            box-sizing: border-box; /* 패딩이 박스 크기를 키우지 않게 설정 */
        }

        .container {
            /* [<div>] : [투명 박스] - 내용물들을 하나로 묶어주는 상자 구역. */
            width: 100%;
            max-width: 400px; /* PC에서는 최대 400px까지만 커짐 */
            text-align: center;
            background: rgba(255, 255, 255, 0.05); /* 5% 투명한 흰색 배경 */
            padding: 30px;
            border-radius: 20px; /* 모서리 둥글게 */
            backdrop-filter: blur(10px); /* [유리 효과] 배경을 흐릿하게 처리 */
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); /* 입체감 있는 그림자 */
        }

        /* [미디어 쿼리] : [모바일 최적화 전용] - 폰(너비 600px 이하)에서만 발동하는 규칙 */
        @media (max-width: 600px) {
            .container { padding: 20px; }
            h1 { font-size: 24px; }
            input, select, button { 
                width: 100%; /* 폰에서는 입력창과 버튼을 가로로 꽉 채워 터치를 편하게 함 */
                box-sizing: border-box;
            }
        }

        input, select {
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: none;
            outline: none; /* 클릭 시 테두리 강조 제거 */
            font-size: 16px;
        }

        button {
            padding: 12px 30px;
            /* [그라데이션] 보라에서 파랑으로 부드럽게 섞이는 배경 */
            background: linear-gradient(45deg, #6a11cb, #2575fc);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer; /* 마우스 올리면 손가락 모양으로 변경 */
            font-size: 18px;
            transition: 0.3s; /* 상태 변화 시 0.3초 동안 부드럽게 */
            margin-top: 15px;
            font-weight: bold;
        }

        button:hover {
            /* [:hover] : 마우스를 올렸을 때 발동하는 효과 */
            transform: scale(1.05); /* 크기 1.05배 키우기 */
            box-shadow: 0 0 15px rgba(37, 117, 252, 0.5);
        }

        .copy-btn {
            background: #444; /* 공유 버튼은 덜 튀는 회색으로 */
            font-size: 14px;
            padding: 8px 15px;
            margin-top: 10px;
        }

        #result {
            margin-top: 25px;
            font-size: 18px;
            line-height: 1.6;
            min-height: 100px; /* 결과가 나올 때 화면이 덜컹거리지 않게 공간 확보 */
        }

        /* [로딩 효과] 반짝거리는 애니메이션 */
        .loading {
            font-style: italic;
            color: #ffd700;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.5; }
        }

        @keyframes fadeIn {
            /* [fadeIn] : 서서히 나타나는 효과 시나리오 */
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="dateDisplay" style="font-size: 12px; color: #aaa; margin-bottom: 10px;"></div>
        <h1>🌟 별자리 운세</h1>
        
        <input type="text" id="nameInput" placeholder="이름을 입력하세요">
        
        <select id="zodiacSelect">
            <option value="물병자리">물병자리</option>
            <option value="물고기자리">물고기자리</option>
            <option value="양자리">양자리</option>
            <option value="황소자리">황소자리</option>
            <option value="쌍둥이자리">쌍둥이자리</option>
            <option value="게자리">게자리</option>
            <option value="사자자리">사자자리</option>
            <option value="처녀자리">처녀자리</option>
            <option value="천칭자리">천칭자리</option>
            <option value="전갈자리">전갈자리</option>
            <option value="사수자리">사수자리</option>
            <option value="염소자리">염소자리</option>
        </select>
        
        <br> 
        
        <button id="mainBtn" onclick="getFortune()">오늘의 운세 보기</button>

        <div id="result"></div>
        
        <button id="copyBtn" class="copy-btn" onclick="copyResult()" style="display: none;">결과 복사하기 📋</button>
    </div>

    <script>
        /* [<script>] : [자동화 시스템] - 웹사이트에 지능을 부여하는 자바스크립트 공간. */

        // [window.onload] : 창이 로딩 완료되자마자 자동 실행
        window.onload = function() {
            const today = new Date(); // 내장 시계 소환
            const dateStr = `${today.getFullYear()}년 ${today.getMonth() + 1}월 ${today.getDate()}일`;
            document.getElementById('dateDisplay').innerText = dateStr;

            // [localStorage] : [개인 사물함] - 브라우저가 꺼져도 이름을 기억함
            const savedName = localStorage.getItem('starUserName');
            if (savedName) {
                document.getElementById('nameInput').value = savedName;
            }
        };

        function getFortune() {
            // [.trim()] : [지우개] - 이름 앞뒤의 쓸데없는 공백 제거
            const name = document.getElementById('nameInput').value.trim();
            const zodiac = document.getElementById('zodiacSelect').value;
            const resultDiv = document.getElementById('result');
            const copyBtn = document.getElementById('copyBtn');

            if (name === "") {
                alert("이름을 입력해주세요! ✨");
                return;
            }

            // 사물함에 이름 저장
            localStorage.setItem('starUserName', name);

            // [로딩 연출] 기대감을 주기 위한 가짜 로딩 문구
            resultDiv.innerHTML = `<p class="loading">운명의 별들을 연결하는 중... 💫</p>`;
            copyBtn.style.display = "none";

            // [setTimeout] : [타이머] - 1.2초 뒤에 실제 결과를 보여줌
            setTimeout(() => {
                const fortunes = [
                    "오늘은 뜻밖의 장소에서 소중한 인연을 만날 수 있습니다.",
                    "오랫동안 고민하던 문제가 해결될 기미가 보입니다.",
                    "당신의 작은 배려가 큰 행운으로 돌아오는 날입니다.",
                    "새로운 도전을 시작하기에 아주 좋은 기운이 흐릅니다.",
                    "오늘은 휴식이 최고의 보약입니다. 자신을 돌봐주세요."
                ];
                
                const luckyItems = ["손수건", "파란색 펜", "따뜻한 커피", "좋아하는 노래", "노란색 소품"];
                
                // [랜덤 공식] 바구니 속에서 무작위 하나 뽑기
                const randomFortune = fortunes[Math.floor(Math.random() * fortunes.length)];
                const randomItem = luckyItems[Math.floor(Math.random() * luckyItems.length)];
                const randomNumber = Math.floor(Math.random() * 10) + 1;

                // [결과 출력] 애니메이션과 함께 실제 데이터 꽂아넣기
                resultDiv.style.animation = 'none'; 
                resultDiv.offsetHeight; /* 강제 새로고침 (애니메이션 재시작용) */
                resultDiv.style.animation = 'fadeIn 0.8s ease-in';

                resultDiv.innerHTML = `
                    <div style="background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px;">
                        <strong>${name}</strong> 님의 <strong>${zodiac}</strong> 운세<br>
                        <p style="color: #ffd700;">"${randomFortune}"</p>
                        <small>🍀 아이템: ${randomItem} | 🔢 숫자: ${randomNumber}</small>
                    </div>
                `;
                
                copyBtn.style.display = "inline-block"; // 결과 완료 시 복사 버튼 노출
            }, 1200);
        }

        // [복사 기능] 클립보드에 결과 텍스트를 담아주는 기능
        function copyResult() {
            const text = document.getElementById('result').innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert("운세가 복사되었습니다! 친구들에게 공유해보세요. ✨");
            });
        }
    </script>
</body>
</html>
